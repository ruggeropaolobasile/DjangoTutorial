# Example Codex CLI config.toml
# Copy to your local Codex config path and customize.

model = "gpt-5"
model_reasoning_effort = "medium"

# Workspace policy defaults (set per your safety preference).
sandbox_mode = "workspace-write"
approval_policy = "on-request"

# Windows-only override.
# If `codex login status` or `codex exec` fail with `Accesso negato. (os error 5)`,
# prefer `unelevated` instead of `elevated`.
[windows]
sandbox = "unelevated"

