[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  ".git",
  ".venv",
  "venv",
  "__pycache__",
  "mysite/staticfiles",
  "mysite/polls/migrations",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"mysite/mysite/tests.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
